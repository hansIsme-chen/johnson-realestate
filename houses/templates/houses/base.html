<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的夢想房產 - 專業經紀平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Poppins', 'Microsoft JhengHei', sans-serif; 
            background-color: #f4f7f6; /* CCPS 喜歡用的淺灰底色 */
            color: #333;
        }

        /* 專業級 Hero Section 樣式 */
        .hero-section { 
            /* 換上一個高品質的房屋大圖連結 */
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1512917774080-9991f1c4c750?q=80&w=1600&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            color: white; 
            padding: 100px 0; /* 加高垂直距離 */
        }

        /* 專業級卡片樣式：細緻陰影與懸浮 */
        .house-card { 
            border: none;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease-in-out;
            /* 基礎陰影 */
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        
        /* 懸浮時加強陰影並往上浮起 */
        .house-card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 12px 20px rgba(0,0,0,0.1); 
        }

        .card-img-top {
            height: 220px;
            object-fit: cover;
        }

        /* 規格標籤樣式 */
        .spec-item {
            background-color: #f0f2f5;
            padding: 4px 8px;
            border-radius: 4px;
            margin-right: 5px;
        }

        /* 自定義按鈕樣式 */
        .btn-action {
            border-radius: 20px;
            padding: 8px 16px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="/">🏠 我的夢想房產</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link active" href="/">首頁物件</a>
                <a class="nav-link" href="/admin">管理後台</a>
            </div>
        </div>
    </nav>
    
    <div class="container mt-3">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
    </div>

    {% block content %}
    {% endblock %}

    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p>© 2026 我的房產網站專案 | 仿 CCPS 專業升級版</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
